<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>IronStack Training Booking</title>
        <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
        <link rel="stylesheet" href="style.css">
        <link rel="icon" href="data:,">
    </head>

    <body>
        
        <h2>Book Your Training</h2>

        <form id="bookingForm">
            <label>Select Start Date:</label>
            <input type="text" id="dateInput" placeholder="Select a date" required readonly>
            <div style="margin-top: 10px;">
                <button type="button" id="todayBtn">Today</button>
            </div>

            <p id="errorMsg" style="color: red;"></p>

            <button type="submit" id="submitBtn">Add to Cart</button>
        </form>

        <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
        <script src="script.js"></script>
    </body>

</html>
